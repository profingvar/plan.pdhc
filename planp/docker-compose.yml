services:
  db:
    image: postgres:16
    container_name: pdhc_db
    restart: unless-stopped
    ports:
      # Loopback-only bind per CLAUDE.md §3 — never expose db to the LAN.
      - "127.0.0.1:9031:5432"
    env_file:
      - .env
    volumes:
      - pdhc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      # Build context is the repo root so the image can COPY root-level
      # docs (progress.md, top_rules.md, …) served via /api/v1/docs/.
      # Trying to use the volume mount `../:/project-docs:ro` instead
      # silently failed in prod (Colima virtiofs only mounts
      # /Users/miserver, not /usr/local/www/), so the docs are now
      # baked into the image. See planp/Dockerfile + .dockerignore.
      context: ..
      dockerfile: planp/Dockerfile
    container_name: pdhc_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:9030:9030"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

volumes:
  pdhc_pgdata:
