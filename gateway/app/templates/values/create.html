{% extends "base.html" %}
{% block title %}New Value — PDHC PlanDef Builder{% endblock %}

{% block content %}
<div class="page-header">
  <h1>New Value</h1>
</div>

<div class="card">
  <form method="post">
    <div class="form-row">
      <div class="form-group">
        <label for="value_name">Name *</label>
        <input type="text" id="value_name" name="value_name" class="form-control" required>
      </div>
      <div class="form-group">
        <label for="value_display_text">Display Text</label>
        <input type="text" id="value_display_text" name="value_display_text" class="form-control">
      </div>
    </div>

    <div class="form-group">
      <label for="canonical_lib">Canonical Library *</label>
      <select id="canonical_lib" name="canonical_lib" class="form-control" required>
        <option value="">Select...</option>
        {% for lib in canonical_libs %}
        <option value="{{ lib.guid }}">{{ lib.canonical_lib_name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="canonical_refnumber">Reference Number</label>
        <input type="text" id="canonical_refnumber" name="canonical_refnumber" class="form-control">
      </div>
      <div class="form-group">
        <label for="author">Author</label>
        <input type="text" id="author" name="author" class="form-control">
      </div>
    </div>

    <div class="form-group">
      <label for="value_explanation">Explanation</label>
      <textarea id="value_explanation" name="value_explanation" class="form-control" rows="3"></textarea>
    </div>

    <div class="button-group">
      <button type="submit" class="btn btn-primary"><i data-lucide="plus"></i> Create Value</button>
      <a href="{{ url_for('values_web.list_values') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
