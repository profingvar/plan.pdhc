{% extends "base.html" %}
{% block title %}New Form Definition — PDHC PlanDef Builder{% endblock %}

{% block content %}
<div class="page-header">
  <h1>New Form Definition</h1>
  <a href="{{ url_for('forms_defs_web.list_definitions') }}" class="btn btn-secondary btn-sm"><i data-lucide="arrow-left"></i> Back</a>
</div>

<div class="card">
  <form method="post">
    <div class="form-group">
      <label for="title">Title *</label>
      <input type="text" id="title" name="title" class="form-control" required
             placeholder="e.g. Blood Pressure Monitoring Form">
    </div>
    <div class="form-group">
      <label for="name">Machine Name</label>
      <input type="text" id="name" name="name" class="form-control"
             placeholder="Auto-derived from title if left empty">
      <span class="text-muted" style="font-size: 0.85em;">Lowercase, hyphens only. Used for API references.</span>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" class="form-control" rows="3"
                placeholder="Describe the purpose of this form"></textarea>
    </div>
    <div class="button-group">
      <button type="submit" class="btn btn-primary"><i data-lucide="plus"></i> Create &amp; Edit</button>
      <a href="{{ url_for('forms_defs_web.list_definitions') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
