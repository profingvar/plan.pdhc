{% extends "base.html" %}
{% block title %}Edit {{ vs.valueset_name }} — PDHC PlanDef Builder{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit ValueSet</h1>
</div>

<div class="card">
  <form method="post">
    <div class="form-row">
      <div class="form-group">
        <label for="valueset_name">Name *</label>
        <input type="text" id="valueset_name" name="valueset_name" class="form-control" value="{{ vs.valueset_name }}" required>
      </div>
      <div class="form-group">
        <label for="valueset_display_text">Display Text</label>
        <input type="text" id="valueset_display_text" name="valueset_display_text" class="form-control" value="{{ vs.valueset_display_text or '' }}">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="canonical_refnumber">Reference Number</label>
        <input type="text" id="canonical_refnumber" name="canonical_refnumber" class="form-control" value="{{ vs.canonical_refnumber or '' }}">
      </div>
      <div class="form-group">
        <label for="author">Author</label>
        <input type="text" id="author" name="author" class="form-control" value="{{ vs.author or '' }}">
      </div>
    </div>

    <div class="form-group">
      <label for="valueset_explanation">Explanation</label>
      <textarea id="valueset_explanation" name="valueset_explanation" class="form-control" rows="3">{{ vs.valueset_explanation or '' }}</textarea>
    </div>

    <div class="button-group">
      <button type="submit" class="btn btn-primary"><i data-lucide="save"></i> Save Changes</button>
      <a href="{{ url_for('valuesets_web.view_valueset', guid=vs.guid) }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
